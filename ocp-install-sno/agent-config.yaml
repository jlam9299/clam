apiVersion: v1alpha1
kind: AgentConfig
metadata:
  name: sno-fips
rendezvousIP: 10.120.20.60
additionalNTPSources:
  - time1.google.com
hosts:
  - hostname: node-01
    role: master
    rootDeviceHints:
      deviceName: "/dev/vda"
    interfaces:
      - name: enp1s0
        macAddress: 00:01:02:03:04:05
    networkConfig:
      interfaces:
        - name: enp1s0
          type: ethernet
          state: up
          mac-address: 00:01:02:03:04:05
          ipv4:
            enabled: true
            dhcp: false
            address:
              - ip: 10.120.20.60
                prefix-length: 24
          ipv6:
            enabled: false
      dns-resolver:
        config:
          server:
            - 8.8.8.8
      routes:
        config:
          - destination: 0.0.0.0/0
            next-hop-address: 10.120.20.1
            next-hop-interface: enp1s0
            table-id: 254