apiVersion: v1
baseDomain: clamie.au
metadata:
  name: ocp
fips: false
networking:
  networkType: OVNKubernetes
  machineNetwork:
    - cidr: 192.168.40.0/27
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16
controlPlane:
  name: master
  replicas: 3
  hyperthreading: Enabled
compute:
  - name: worker
    replicas: 0
    hyperthreading: Enabled
platform:
  baremetal:
    apiVIPs:
      - 192.168.40.2
    ingressVIPs:
      - 192.168.40.3
pullSecret: 'REPLACE_ME'
sshKey: 'REPLACE_ME'
